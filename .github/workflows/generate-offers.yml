name: Generate Offers JSON

on:
  schedule:
    # Roda todos os dias às 04:00 UTC (01:00 Horário de Brasília)
    - cron: '0 4 * * *'
  
  # Permite rodar o workflow manualmente pelo GitHub (útil para testes)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm init -y
          npm install firebase-admin
          
      - name: Create Firebase Credentials File
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        shell: bash
        run: |
          echo "$FIREBASE_CREDENTIALS" > firebase-service-account.json
          
      - name: Run Data Fetch Script
        run: |
          node fetch-data.js
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ofertas.json
          git commit -m "chore(data): update offers json cache via GitHub Action" || echo "No changes to commit"
          git push
